<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title$ · Manudeo Singh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1c2b4a;
    --navy-light: #2d4070;
    --gold: #b8943f;
    --gold-light: #d4b060;
    --cream: #f7f2ea;
    --cream-dark: #ede5d6;
    --text: #2a2a2a;
    --text-muted: #5a5a5a;
    --text-light: #8a8a8a;
    --white: #ffffff;
    --border: #d6cfc4;
    --section-alt: #f0ebe1;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--cream);
    color: var(--text);
    line-height: 1.75;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--navy);
    border-bottom: 3px solid var(--gold);
    padding: 0 2rem;
  }
  .nav-inner {
    max-width: 780px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
  }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 600;
    color: var(--cream); text-decoration: none; letter-spacing: 0.03em;
  }
  .nav-brand span { color: var(--gold-light); }
  .nav-back {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(247,242,234,0.65); text-decoration: none;
    padding: 0.3rem 0.75rem; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 2px; transition: all 0.2s;
  }
  .nav-back:hover { color: var(--gold-light); border-color: var(--gold-light); }

  /* ── POST HEADER ── */
  .post-header {
    background: var(--navy);
    padding: 4rem 2rem 3rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .post-header-inner { max-width: 780px; margin: 0 auto; }
  .post-breadcrumb {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold-light); margin-bottom: 1.2rem;
  }
  .post-breadcrumb a { color: var(--gold-light); text-decoration: none; }
  .post-breadcrumb a:hover { text-decoration: underline; }
  .post-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.9rem, 5vw, 2.8rem);
    font-weight: 600; line-height: 1.2;
    color: var(--cream); margin-bottom: 1.2rem;
    letter-spacing: -0.01em;
  }
  .post-meta {
    display: flex; flex-wrap: wrap; gap: 1.25rem;
    align-items: center;
  }
  .post-date {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.08em;
    color: rgba(247,242,234,0.55);
  }
  .post-tags { display: flex; gap: 0.45rem; flex-wrap: wrap; }
  .post-tag {
    padding: 0.18rem 0.65rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.76rem; font-style: italic;
    border: 1px solid rgba(184,148,63,0.4);
    color: var(--gold-light); border-radius: 20px;
  }

  /* ── POST BODY ── */
  .post-body {
    max-width: 780px; margin: 0 auto;
    padding: 3.5rem 2rem 5rem;
  }

  /* Typography */
  .post-body p { margin-bottom: 1.4rem; font-size: 1.05rem; color: #35302a; }
  .post-body p:last-child { margin-bottom: 0; }

  .post-body h1, .post-body h2, .post-body h3, .post-body h4 {
    font-family: 'Cormorant Garamond', serif;
    color: var(--navy); line-height: 1.25;
    margin-top: 2.5rem; margin-bottom: 0.75rem;
  }
  .post-body h1 { font-size: 2rem; font-weight: 600; }
  .post-body h2 {
    font-size: 1.6rem; font-weight: 600;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .post-body h3 { font-size: 1.3rem; font-weight: 500; }
  .post-body h4 {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gold); font-weight: 700; margin-top: 2rem;
  }

  .post-body a { color: var(--navy-light); text-decoration: underline; text-underline-offset: 3px; }
  .post-body a:hover { color: var(--gold); }

  .post-body strong { font-weight: 600; color: var(--navy); }
  .post-body em { font-style: italic; }

  .post-body ul, .post-body ol {
    margin: 0 0 1.4rem 1.5rem;
    font-size: 1.02rem;
  }
  .post-body li { margin-bottom: 0.4rem; }

  .post-body blockquote {
    border-left: 3px solid var(--gold);
    padding: 0.75rem 1.25rem;
    margin: 2rem 0;
    background: var(--section-alt);
    border-radius: 0 4px 4px 0;
    font-style: italic;
    color: var(--text-muted);
  }
  .post-body blockquote p { margin-bottom: 0; font-size: 1rem; }

  .post-body figure {
    margin: 2rem 0;
    text-align: center;
  }
  .post-body figure img {
    max-width: 100%; height: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .post-body figcaption {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.05em;
    color: var(--text-light); margin-top: 0.6rem;
    font-style: normal;
  }

  .post-body img { max-width: 100%; height: auto; }

  .post-body table {
    width: 100%; border-collapse: collapse;
    margin: 1.5rem 0; font-size: 0.9rem;
  }
  .post-body th {
    background: var(--navy); color: var(--cream);
    padding: 0.6rem 0.9rem; text-align: left;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.06em; font-weight: 700;
  }
  .post-body td {
    padding: 0.55rem 0.9rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .post-body tr:nth-child(even) td { background: var(--section-alt); }

  .post-body hr {
    border: none; border-top: 1px solid var(--border);
    margin: 2.5rem 0;
  }

  .post-body code {
    font-family: 'Space Mono', monospace;
    font-size: 0.83em;
    background: var(--section-alt);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    border: 1px solid var(--border);
  }
  .post-body pre {
    background: var(--navy);
    padding: 1.25rem 1.5rem;
    border-radius: 4px;
    overflow-x: auto;
    margin: 1.5rem 0;
  }
  .post-body pre code {
    background: none; border: none; padding: 0;
    font-size: 0.82rem; color: var(--cream-dark);
    line-height: 1.65;
  }

  /* ── BACK LINK ── */
  .post-footer {
    max-width: 780px; margin: 0 auto;
    padding: 0 2rem 3rem;
    border-top: 1px solid var(--border);
    padding-top: 2rem;
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--navy-light); text-decoration: none;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border); border-radius: 2px;
    background: var(--white);
    transition: all 0.2s;
  }
  .back-link:hover { background: var(--navy); color: var(--cream); border-color: var(--navy); }

  /* ── SITE FOOTER ── */
  footer {
    background: var(--navy);
    border-top: 3px solid var(--gold);
    padding: 2rem;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: rgba(247,242,234,0.35);
  }
  footer a { color: rgba(247,242,234,0.5); text-decoration: none; }
  footer a:hover { color: var(--gold-light); }

  @media (max-width: 600px) {
    .post-header { padding: 2.5rem 1.25rem 2rem; }
    .post-body { padding: 2.5rem 1.25rem 4rem; }
    .post-footer { padding: 0 1.25rem 2.5rem; padding-top: 1.5rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="../index.html">Dr. <span>Manudeo Singh</span></a>
    <a class="nav-back" href="../index.html#blog">← Blog</a>
  </div>
</nav>

<!-- POST HEADER -->
<header class="post-header">
  <div class="post-header-inner">
    <div class="post-breadcrumb">
      <a href="../index.html">Home</a> &nbsp;/&nbsp; <a href="../index.html#blog">Blog</a> &nbsp;/&nbsp; Post
    </div>
    <h1 class="post-title">$title$</h1>
    <div class="post-meta">
$if(date)$
      <span class="post-date">$date$</span>
$endif$
$if(tags)$
      <div class="post-tags">
$for(tags)$        <span class="post-tag">$tags$</span>
$endfor$
      </div>
$endif$
    </div>
  </div>
</header>

<!-- POST BODY (Pandoc inserts converted Word content here) -->
<main class="post-body">
$body$
</main>

<!-- BACK LINK -->
<div class="post-footer">
  <a class="back-link" href="../index.html#blog">← Back to all posts</a>
</div>

<!-- SITE FOOTER -->
<footer>
  <a href="../index.html">manudeo.github.io</a> &nbsp;·&nbsp; Dr. Manudeo Singh &nbsp;·&nbsp; Aberystwyth University
</footer>

</body>
</html>
